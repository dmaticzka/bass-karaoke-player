name: Feature Request
description: Suggest a new feature or improvement for Bass Karaoke Player.
title: "feat: <short description>"
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement! The more detail you provide, the easier it is to evaluate and implement.

  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What problem does this feature solve, or what use-case does it address?
      placeholder: "It would be useful to… / Currently there is no way to…"
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe what you'd like to happen. Be as specific as possible.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Have you considered any workarounds or alternative approaches?

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of the application does this relate to?
      options:
        - Backend API
        - Audio processing (demucs / rubberband)
        - Frontend / UI
        - Docker / deployment
        - CI/CD
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Any mockups, references, or other context.
