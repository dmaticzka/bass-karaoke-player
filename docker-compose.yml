services:
  bass-karaoke-player:
    # Use the pre-built image from GitHub Container Registry (ghcr.io).
    # To build locally instead, run: docker compose up --build
    image: ghcr.io/dmaticzka/bass-karaoke-player:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bass-karaoke-player
    ports:
      - "8000:8000"
    volumes:
      # Persist uploaded songs and processed stems between restarts
      - karaoke_data:/data
      # Persist downloaded AI model weights between image updates
      - karaoke_models:/models
    environment:
      - DATA_DIR=/data
      - FRONTEND_DIR=/app/frontend-dist
      - TORCH_HOME=/models
      - DEMUCS_JOBS=4
      # Maximum number of demucs stem-splitting jobs that run concurrently.
      # Demucs is very CPU- and memory-intensive; increase this only if the
      # host has enough cores and RAM to support parallel splitting.
      - MAX_SPLIT_WORKERS=1
      # Maximum number of rubberband stem-processing jobs that run concurrently.
      # Rubberband is not memory-intensive; the default of 4 allows several
      # stems to be processed in parallel. Increase or decrease based on the
      # number of CPU cores available on the host.
      - MAX_PROCESS_WORKERS=4
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  karaoke_data:
    driver: local
  karaoke_models:
    driver: local
